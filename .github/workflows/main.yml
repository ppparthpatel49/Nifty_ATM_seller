name: Nifty ATM Option Bot

on:
  # IMPORTANT:
  # GitHub scheduled cron is not reliable for exact every-5-minute triggers.
  # So this workflow starts only 2 times per market day and then runs an internal
  # Python loop that calls scan_once.py every 5 minutes during market hours.
  schedule:
    # 09:15 IST = 03:45 UTC, first market session
    - cron: "45 3 * * 1-5"

    # 12:15 IST = 06:45 UTC, second session refresh
    # This cancels/replaces the first run and continues until market close.
    - cron: "45 6 * * 1-5"

  workflow_dispatch:
    inputs:
      run_mode:
        description: "single = run once now, session = keep running every 5 minutes during market hours"
        required: true
        default: "single"
        type: choice
        options:
          - single
          - session

permissions:
  contents: read

concurrency:
  group: nifty-atm-option-bot
  cancel-in-progress: true

jobs:
  run-bot:
    name: Run Nifty ATM Option Bot
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      TZ: Asia/Kolkata
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      RUN_MODE: ${{ github.event_name == 'schedule' && 'session' || inputs.run_mode }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot session
        shell: bash
        run: |
          python - << 'EOF'
          import os
          import sys
          import time
          import subprocess
          from datetime import datetime, timezone, timedelta

          IST = timezone(timedelta(hours=5, minutes=30))
          RUN_MODE = os.getenv("RUN_MODE", "single")

          MARKET_OPEN_MINUTES = 9 * 60 + 15
          MARKET_CLOSE_MINUTES = 15 * 60 + 30

          def now_ist():
              return datetime.now(IST)

          def minutes_of_day(dt):
              return dt.hour * 60 + dt.minute

          def is_weekday(dt):
              return dt.weekday() < 5

          def is_market_open(dt):
              return is_weekday(dt) and MARKET_OPEN_MINUTES <= minutes_of_day(dt) <= MARKET_CLOSE_MINUTES

          def seconds_until_market_open(dt):
              current = minutes_of_day(dt)
              target = MARKET_OPEN_MINUTES
              seconds = (target - current) * 60 - dt.second
              return max(seconds, 0)

          def seconds_until_next_5_min_boundary(dt):
              # Align scans to clean 5-minute marks like 09:15, 09:20, 09:25, etc.
              seconds_since_hour = dt.minute * 60 + dt.second
              next_boundary = ((seconds_since_hour // 300) + 1) * 300
              return max(next_boundary - seconds_since_hour, 1)

          def run_scan():
              started = now_ist()
              print(f"\n--- Running scan_once.py at {started.strftime('%Y-%m-%d %H:%M:%S')} IST ---", flush=True)
              result = subprocess.run([sys.executable, "scan_once.py"])
              ended = now_ist()
              print(f"--- scan_once.py finished with exit code {result.returncode} at {ended.strftime('%Y-%m-%d %H:%M:%S')} IST ---", flush=True)
              return result.returncode

          print(f"RUN_MODE: {RUN_MODE}", flush=True)
          print(f"Current IST time: {now_ist().strftime('%Y-%m-%d %H:%M:%S')}", flush=True)

          # Manual testing mode: run once immediately, even outside market hours.
          if RUN_MODE == "single":
              sys.exit(run_scan())

          # Scheduled/session mode: keep process alive and scan every 5 minutes during market hours.
          failure_count = 0

          while True:
              now = now_ist()
              current_minutes = minutes_of_day(now)

              print(f"Heartbeat IST: {now.strftime('%Y-%m-%d %H:%M:%S')}", flush=True)

              if not is_weekday(now):
                  print("Today is not a weekday. Exiting.", flush=True)
                  break

              if current_minutes < MARKET_OPEN_MINUTES:
                  sleep_seconds = seconds_until_market_open(now)
                  print(f"Market not open yet. Sleeping {sleep_seconds} seconds.", flush=True)
                  time.sleep(sleep_seconds)
                  continue

              if current_minutes > MARKET_CLOSE_MINUTES:
                  print("Market closed. Exiting bot session.", flush=True)
                  break

              code = run_scan()
              if code != 0:
                  failure_count += 1
                  print(f"Warning: scan failed. Failure count: {failure_count}", flush=True)

              now = now_ist()
              if minutes_of_day(now) >= MARKET_CLOSE_MINUTES:
                  print("Market close reached after scan. Exiting.", flush=True)
                  break

              sleep_seconds = seconds_until_next_5_min_boundary(now)
              print(f"Sleeping {sleep_seconds} seconds until next 5-minute scan slot.", flush=True)
              time.sleep(sleep_seconds)

          print(f"Bot session ended. Total scan failures during this session: {failure_count}", flush=True)
          EOF
