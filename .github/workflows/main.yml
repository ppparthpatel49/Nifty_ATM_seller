name: Nifty ATM Option Bot

on:
  # GitHub cron uses UTC.
  # This triggers the workflow every 5 minutes on weekdays.
  # The Python market check below decides whether scan_once.py should actually run.
  schedule:
    - cron: "*/5 * * * 1-5"

  # Manual run for testing.
  workflow_dispatch:
    inputs:
      force_run:
        description: "Run scan_once.py even if market is closed"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: nifty-atm-option-bot
  cancel-in-progress: true

jobs:
  run-bot:
    name: Run Nifty ATM Option Scan
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - name: Check if market is open IST
        id: market_check
        shell: bash
        run: |
          python3 - << 'EOF'
          import os
          from datetime import datetime, timezone, timedelta

          ist = timezone(timedelta(hours=5, minutes=30))
          now = datetime.now(ist)

          weekday = now.weekday()  # Monday = 0, Sunday = 6
          current_minutes = now.hour * 60 + now.minute

          market_open = 9 * 60 + 15    # 09:15 IST
          market_close = 15 * 60 + 30  # 15:30 IST

          is_open = weekday < 5 and market_open <= current_minutes <= market_close

          print(f"IST Time: {now.strftime('%Y-%m-%d %H:%M:%S')}")
          print(f"Market open: {is_open}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"is_open={str(is_open).lower()}\n")
          EOF

      - name: Checkout code
        if: ${{ steps.market_check.outputs.is_open == 'true' || inputs.force_run == true }}
        uses: actions/checkout@v4

      - name: Setup Python
        if: ${{ steps.market_check.outputs.is_open == 'true' || inputs.force_run == true }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: ${{ steps.market_check.outputs.is_open == 'true' || inputs.force_run == true }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run single scan cycle
        if: ${{ steps.market_check.outputs.is_open == 'true' || inputs.force_run == true }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scan_once.py
