name: Nifty ATM Option Bot

on:
  # Scheduled runs are in UTC. IST = UTC + 5:30
  # NSE market hours: 09:15-15:30 IST = 03:45-10:00 UTC
  schedule:
    # 09:15, 09:20, 09:25 IST
    - cron: "45-59/5 3 * * 1-5"

    # 09:30 to 14:55 IST, every 5 minutes
    - cron: "*/5 4-9 * * 1-5"

    # 15:30 IST final scan
    - cron: "0 10 * * 1-5"

  # Manual run for testing
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nifty-atm-option-bot
  cancel-in-progress: true

jobs:
  run-bot:
    name: Run Nifty ATM Option Scan
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check if market is open IST
        id: market_check
        shell: bash
        run: |
          python - << 'EOF'
          import os
          from datetime import datetime, timezone, timedelta

          ist = timezone(timedelta(hours=5, minutes=30))
          now = datetime.now(ist)

          weekday = now.weekday()  # Monday = 0, Sunday = 6
          minutes_now = now.hour * 60 + now.minute
          market_open = 9 * 60 + 15
          market_close = 15 * 60 + 30

          is_open = weekday < 5 and market_open <= minutes_now <= market_close

          print(f"IST Time: {now.strftime('%Y-%m-%d %H:%M:%S')}")
          print(f"Market open: {is_open}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"is_open={str(is_open).lower()}\n")
          EOF

      - name: Run single scan cycle
        if: ${{ steps.market_check.outputs.is_open == 'true' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scan_once.py
